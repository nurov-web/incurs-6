<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дорухонаи Саломатӣ — Тамос</title>
<link rel="stylesheet" href="4.css">
</head>
<body>

<header class="header">
  <div class="container nav-wrap">
    <a href="index.html" class="logo">💊 Саломатӣ</a>
    <nav class="nav">
      <a href="index.html">Асосӣ</a>
      <a href="products.html">Маҳсулот</a>
      <a href="contact.html" class="active">Тамос</a>
    </nav>
  </div>
</header>

<section class="page-title">
  <h1>Бо мо тамос гиред</h1>
  <p>Мо ҳамеша тайёрем ба саволҳои шумо ҷавоб диҳем</p>
</section>

<section class="contact container">
  <div class="contact-info">
    <div class="info-item"><span>📍</span> ш. Душанбе, кӯчаи Рӯдакӣ 45</div>
    <div class="info-item"><span>📞</span> +992 90 000 00 00</div>
    <div class="info-item"><span>✉️</span> info@salomati.tj</div>
    <div class="info-item"><span>⏰</span> Ҳар рӯз 8:00 – 22:00</div>
  </div>

  <form class="contact-form" onsubmit="return sendForm(event)">
    <h3>Паём фиристед</h3>
    <input type="text" placeholder="Номи шумо" required>
    <input type="tel" placeholder="Рақами телефон" required>
    <textarea rows="4" placeholder="Паёми шумо" required></textarea>
    <button type="submit" class="btn">Фиристодан</button>
  </form>
</section>

<footer class="footer">
  <p>© 2026 Дорухонаи Саломатӣ. Ҳамаи ҳуқуқҳо ҳифз шудаанд.</p>
</footer>

<script src="4.js"></script>
</body>
</html>
